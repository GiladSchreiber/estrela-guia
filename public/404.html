<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Estrela Guia</title>
    <script>
      // SPA redirect trick for GitHub Pages.
      // When GH Pages 404s on a deep path, redirect to index.html
      // with the path encoded as ?p=... so React Router can pick it up.
      // segmentCount = 1 because the repo is served at /estrela-guia/
      var segmentCount = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '~and~' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
